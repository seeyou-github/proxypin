name: Build Android arm-v8a

on:
  workflow_dispatch:
    inputs:
      applicationid:
        description: Android applicationId to build with
        required: false
        default: com.network.proxy
  push:

jobs:
  build:
    name: Android arm-v8a APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Resolve Android applicationId
        id: appid
        run: |
          app_id="${{ inputs.applicationid }}"
          if [ -z "$app_id" ]; then
            app_id="com.network.proxy"
          fi
          if [[ ! "$app_id" =~ ^[A-Za-z][A-Za-z0-9_]*(\.[A-Za-z][A-Za-z0-9_]*)+$ ]]; then
            echo "Invalid Android applicationId: $app_id"
            exit 1
          fi
          echo "application_id=$app_id" >> "$GITHUB_OUTPUT"

      - name: Check signing keystore
        run: test -f TestKey.jks

      - name: Get dependencies
        run: flutter pub get

      - name: Prepare arm64-only Gradle config
        run: |
          sed -i "s/ndk { abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64' }/ndk { abiFilters 'arm64-v8a' }/" android/app/build.gradle

      - name: Build Android arm64 APK
        env:
          ORG_GRADLE_PROJECT_androidApplicationId: ${{ steps.appid.outputs.application_id }}
        run: flutter build apk --release --target-platform android-arm64

      - name: Collect arm-v8a APK
        run: |
          mkdir -p build/artifacts
          apk_path="$(find build/app/outputs -name 'proxypin-android.apk' -type f | head -n 1)"
          if [ -z "$apk_path" ]; then
            apk_path="$(find build/app/outputs -name '*arm64-v8a*.apk' -type f | head -n 1)"
          fi
          if [ -z "$apk_path" ]; then
            echo "No arm64-v8a APK found under build/app/outputs"
            find build/app/outputs -name '*.apk' -type f -print
            exit 1
          fi
          cp "$apk_path" build/artifacts/proxypin-android-arm-v8a.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxypin-android-arm-v8a
          path: build/artifacts/proxypin-android-arm-v8a.apk
          if-no-files-found: error
